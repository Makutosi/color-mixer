<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Color Mixer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="app.js" defer></script>
</head>
<body>
  <header>
    <div class="logo">
      <span class="dot" id="header-dot"></span>
      <h1 class="logo-text">Color<span>Mixer</span></h1>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <div class="tab-container">
        <button class="tab-btn active" data-count="2">2 Colors</button>
        <button class="tab-btn" data-count="3">3 Colors</button>
      </div>
      
      <div style="display: flex; gap: 8px;">
        <button id="theme-btn" class="icon-btn" title="Toggle Dark Mode" style="width: 42px; justify-content: center; padding: 8px 0;">
          <span id="theme-icon">☀️</span>
        </button>

        <button id="random-btn" class="icon-btn" title="Randomize Colors">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="7.5 4.21 12 6.81 16.5 4.21"></polyline><polyline points="7.5 19.79 7.5 14.6 3 12"></polyline><polyline points="21 12 16.5 14.6 16.5 19.79"></polyline><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
          Random
        </button>
      </div>
    </div>

    <section class="color-inputs">
      <div class="color-picker" id="wrapper1">
        <div class="picker-container"><input type="color" id="color1" value="#6366f1"></div>
        <span class="hex-label" id="label1">#6366F1</span>
      </div>
      <div class="color-picker" id="wrapper2">
        <div class="picker-container"><input type="color" id="color2" value="#ec4899"></div>
        <span class="hex-label" id="label2">#EC4899</span>
      </div>
      <div class="color-picker" id="wrapper3" style="display: none;">
        <div class="picker-container"><input type="color" id="color3" value="#f59e0b"></div>
        <span class="hex-label" id="label3">#F59E0B</span>
      </div>
    </section>

    <section class="controls">
      <div class="control-group">
        <label for="grad-type">Gradient Style</label>
        <select id="grad-type">
          <option value="linear-135">Linear (135°)</option>
          <option value="linear-to-right">Linear (Right)</option>
          <option value="radial">Radial (Circle)</option>
          <option value="conic">Conic (Sweep)</option>
        </select>
      </div>
    </section>

    <section class="preview">
      <div id="preview-box"></div>
    </section>

    <section class="output">
      <div class="result-item">
        <small>Mixed Color (Average)</small>
        <div class="copy-box" id="mixed-color-btn">
          <span id="mixed-color-value">#000000</span>
          <span class="copy-icon">Copy</span>
        </div>
      </div>
      <div class="result-item">
        <small>CSS Code</small>
        <div class="copy-box" id="gradient-css-btn">
          <code id="gradient-css"></code>
          <span class="copy-icon">Copy</span>
        </div>
      </div>
    </section>
  </main>
  
  <div id="toast" class="toast">Copied to clipboard!</div>
</body>
</html>
