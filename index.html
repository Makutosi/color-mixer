<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professional Color Mixer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="app.js" defer></script>
</head>
<body>
  <header>
    <div class="logo">
      <span class="dot" id="header-dot"></span>
      <h1 class="logo-text">Color<span>Mixer</span></h1>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <div class="tab-container">
        <button class="tab-btn active" data-count="2">2 Colors</button>
        <button class="tab-btn" data-count="3">3 Colors</button>
      </div>
      
      <div style="display: flex; gap: 8px;">
        <button id="theme-btn" class="toolbar-btn" title="Toggle Dark Mode">
          <span id="theme-icon">☀️</span>
        </button>
        <button id="random-btn" class="toolbar-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <circle cx="15.5" cy="15.5" r="1.5"></circle>
            <circle cx="15.5" cy="8.5" r="1.5"></circle>
            <circle cx="8.5" cy="15.5" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
          </svg>
          Random
        </button>
      </div>
    </div>

    <section class="color-inputs" id="drag-container">
      <div class="color-picker" id="wrapper1" draggable="true">
        <div class="picker-container"><input type="color" id="color1" value="#6366f1"></div>
        <span class="code-label" id="label1" data-tooltip="Click to Copy">#6366F1</span>
      </div>
      <div class="color-picker" id="wrapper2" draggable="true">
        <div class="picker-container"><input type="color" id="color2" value="#ec4899"></div>
        <span class="code-label" id="label2" data-tooltip="Click to Copy">#EC4899</span>
      </div>
      <div class="color-picker" id="wrapper3" draggable="true" style="display: none;">
        <div class="picker-container"><input type="color" id="color3" value="#f59e0b"></div>
        <span class="code-label" id="label3" data-tooltip="Click to Copy">#F59E0B</span>
      </div>
    </section>

    <div class="format-toggle-area">
       <span class="toggle-hint">Format:</span>
       <button id="format-toggle-btn">HEX</button>
    </div>

    <section class="controls">
      <div class="control-group">
        <label>Fill Mode</label>
        <select id="fill-mode">
          <option value="gradient">Gradient Fill</option>
          <option value="pattern">Pattern Fill</option>
        </select>
      </div>

      <div id="gradient-area" class="options-area">
        <div class="control-group">
          <label>Shading Style</label>
          <select id="shading-style">
            <option value="horizontal">Horizontal</option>
            <option value="vertical">Vertical</option>
            <option value="diagonal-up">Diagonal Up</option>
            <option value="diagonal-down">Diagonal Down</option>
            <option value="from-corner">From Corner</option>
            <option value="from-center">From Center</option>
          </select>
        </div>
        <div class="control-group">
          <label>Variants</label>
          <select id="grad-variant"></select>
        </div>
      </div>

      <div id="pattern-area" class="options-area" style="display: none;">
        <div class="control-group">
          <label>Pattern Style</label>
          <select id="pattern-style">
            <option value="dots">Dots</option>
            <option value="polka">Polka Dots</option>
            <option value="grid">Grid</option>
            <option value="checker">Checkerboard</option>
            <option value="diagonal-lines">Diagonal Lines</option>
            <option value="waves">Waves</option>
          </select>
        </div>
      </div>
    </section>

    <section class="preview">
      <div id="preview-box"></div>
    </section>

    <section class="output">
      <div class="result-item">
        <small>Mixed Result (Average)</small>
        <div class="copy-box" id="mixed-color-btn">
          <span id="mixed-color-value">#000000</span>
          <span class="copy-icon">Copy</span>
        </div>
      </div>
      <div class="result-item">
        <small>CSS Property</small>
        <div class="copy-box" id="gradient-css-btn">
          <code id="gradient-css"></code>
          <span class="copy-icon">Copy</span>
        </div>
      </div>
    </section>
  </main>
  
  <footer>© 2026 Poco fermata</footer>
  
  <div id="toast-bottom" class="toast toast-bottom">CSS Copied!</div>
  <div id="toast-top" class="toast toast-top">Color Code Copied!</div>
</body>
</html>
